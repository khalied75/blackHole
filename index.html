<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌌 التجربة الكونية - متوافقة مع الجوال</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background: #030514;
      min-height: 100vh;
      padding: 12px;
      background-image: radial-gradient(circle at 30% 40%, #1a1f3a 0%, #030514 80%);
    }
    /* بطاقات كونية */
    .cosmic-card {
      background: rgba(15, 20, 35, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(110, 140, 255, 0.3);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(80, 100, 255, 0.2);
      transition: transform 0.2s;
    }
    .cosmic-card:active {
      transform: scale(0.98);
    }
    /* الثقب الأسود */
    .black-hole-core {
      background: radial-gradient(circle at 30% 30%, #2a1a4a, #000000);
      box-shadow: 0 0 80px #4a1a6a, inset 0 0 40px #330066;
      animation: pulse 3s infinite alternate;
    }
    /* النجم النيوتروني */
    .neutron-star {
      background: radial-gradient(circle at 40% 40%, #5eead4, #155e75);
      box-shadow: 0 0 70px #2dd4bf, 0 0 120px #0891b2;
      animation: neutronPulse 0.8s infinite alternate;
    }
    /* الثقب الأبيض */
    .white-hole {
      background: radial-gradient(circle at 60% 40%, #fef9c3, #fbbf24);
      box-shadow: 0 0 90px #fde047, 0 0 150px #f59e0b;
      animation: whitePulse 2s infinite alternate;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes neutronPulse {
      0% { box-shadow: 0 0 50px #2dd4bf; }
      100% { box-shadow: 0 0 100px #5eead4, 0 0 150px #0284c7; }
    }
    @keyframes whitePulse {
      0% { filter: brightness(1); }
      100% { filter: brightness(1.3); }
    }
    /* العناصر القابلة للمس */
    .random-item {
      position: absolute;
      font-size: 2.5rem;
      cursor: grab;
      touch-action: none; /* مهم جداً لشاشات اللمس */
      user-select: none;
      -webkit-user-select: none;
      filter: drop-shadow(0 0 15px gold);
      transition: filter 0.2s;
      z-index: 100;
      pointer-events: auto;
      will-change: transform, left, top;
    }
    .random-item.touch-dragging {
      transform: scale(1.2);
      filter: drop-shadow(0 0 30px cyan);
      z-index: 1000;
    }
    /* تأثيرات الدخول */
    .spaghettification {
      animation: stretchAndTear 1.8s ease-in forwards;
      pointer-events: none !important;
    }
    @keyframes stretchAndTear {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      25% { transform: scale(1.8, 0.6) rotate(30deg); opacity: 0.9; }
      50% { transform: scale(2.8, 0.2) rotate(60deg); opacity: 0.6; filter: hue-rotate(180deg); }
      75% { transform: scale(4, 0.1) rotate(90deg); opacity: 0.3; }
      100% { transform: scale(5, 0.01) rotate(120deg); opacity: 0; }
    }
    .quantum-tear {
      animation: quantumFlicker 0.4s infinite;
    }
    @keyframes quantumFlicker {
      0% { opacity: 1; transform: translate(0, 0); }
      25% { opacity: 0; transform: translate(8px, -8px); }
      50% { opacity: 1; transform: translate(-10px, 5px); filter: hue-rotate(90deg); }
      75% { opacity: 0.3; transform: translate(10px, 10px); }
      100% { opacity: 1; transform: translate(0, 0); }
    }
    .white-emission {
      animation: emissionBlast 1.2s ease-out forwards;
    }
    @keyframes emissionBlast {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(2.5) rotate(20deg); opacity: 0.8; filter: brightness(2) blur(2px); }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }
    /* شريط التمرير */
    .redshift-bar {
      background: linear-gradient(90deg, #3b82f6, #ef4444, #b91c1c);
      height: 100%;
      border-radius: 999px;
    }
    .zone-area {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px dashed rgba(255,255,255,0.1);
      touch-action: none; /* منع التمرير داخل المنطقة */
    }
    .custom-btn {
      padding: 10px 14px;
      border-radius: 9999px;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      margin: 3px;
      min-width: 50px;
      -webkit-tap-highlight-color: rgba(255,255,255,0.3);
    }
    .custom-btn:active {
      transform: scale(0.9);
      filter: brightness(1.4);
    }
    /* تحسين للأزرار على الجوال */
    @media (max-width: 640px) {
      .custom-btn {
        padding: 12px 16px;
        font-size: 1.1rem;
        min-width: 60px;
      }
      .random-item {
        font-size: 3rem;
      }
    }
    #eventLog {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.85rem;
      -webkit-overflow-scrolling: touch;
    }
    #eventLog div {
      padding: 4px 8px;
      border-bottom: 1px solid #334155;
    }
    .star {
      position: fixed;
      background: white;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    /* رسائل الخطأ */
    .error-message {
      color: #ff6b6b;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body class="flex flex-col items-center" oncontextmenu="return false;">

  <!-- العنوان الرئيسي -->
  <div class="text-center mb-3 z-20 relative max-w-5xl">
    <h1 class="text-3xl md:text-5xl font-black mb-1 bg-clip-text text-transparent bg-gradient-to-l from-red-500 via-purple-400 to-blue-400">🌌 التجربة الكونية</h1>
    <p class="text-indigo-200 text-sm md:text-xl">اسحب بالإصبع · ازاحة · تمدد زمن · أشياء عشوائية</p>
  </div>

  <!-- ثلاث بطاقات رئيسية -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-7xl w-full relative z-20">

    <!-- ========== الثقب الأسود ========== -->
    <div class="cosmic-card p-3 md:p-4 flex flex-col">
      <h2 class="text-2xl md:text-3xl font-bold text-white text-center">⚫ ثقب أسود</h2>
      
      <!-- شريط تمرير المسافة -->
      <div class="mt-2 px-1">
        <div class="flex justify-between text-xs text-indigo-300">
          <span>🚀 بعيد</span>
          <span class="font-mono text-yellow-300" id="bhDistanceLabel">50%</span>
          <span>⚫ قريب</span>
        </div>
        <input type="range" id="bhSlider" min="0" max="100" value="50" class="w-full accent-red-700 my-1 h-6 md:h-4" style="height: 30px; -webkit-appearance: slider-horizontal;">
        
        <!-- مؤشرات -->
        <div class="grid grid-cols-3 gap-1 text-center text-xs mt-2">
          <div><span class="block text-red-400 text-base md:text-lg" id="bhRedshift">z=0.8</span> <span>انزياح أحمر</span></div>
          <div><span class="block text-amber-400 text-base md:text-lg" id="bhTime">1.0x</span> <span>تمدد زمن</span></div>
          <div><span class="block text-purple-300 text-base md:text-lg" id="bhDistortion">متوسط</span> <span>تشوه</span></div>
        </div>
        <div class="w-full bg-gray-800 h-2 rounded-full mt-1 overflow-hidden">
          <div id="bhRedshiftBar" class="redshift-bar" style="width:50%"></div>
        </div>
      </div>
      
      <!-- منطقة الثقب -->
      <div class="zone-area mt-2" id="blackholeZone" style="min-height: 200px;">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-32 h-32 md:w-40 md:h-40 rounded-full black-hole-core flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full border-4 border-purple-700/40 animate-ping"></div>
            <div class="text-4xl md:text-5xl opacity-70">🌀</div>
          </div>
        </div>
        <div id="blackholeItems" class="relative w-full h-full pointer-events-auto"></div>
      </div>
      
      <!-- أزرار الرمي -->
      <div class="flex flex-wrap justify-center gap-1 mt-2">
        <button class="custom-btn bg-gradient-to-r from-amber-600 to-red-600" onclick="throwItem('blackhole','car')" ontouchstart="throwItem('blackhole','car')">🚗</button>
        <button class="custom-btn bg-gradient-to-r from-blue-600 to-purple-600" onclick="throwItem('blackhole','phone')" ontouchstart="throwItem('blackhole','phone')">📱</button>
        <button class="custom-btn bg-gradient-to-r from-green-600 to-yellow-600" onclick="throwItem('blackhole','pizza')" ontouchstart="throwItem('blackhole','pizza')">🍕</button>
        <button class="custom-btn bg-gradient-to-r from-pink-500 to-orange-500" onclick="throwItem('blackhole','random')" ontouchstart="throwItem('blackhole','random')">🎲</button>
      </div>
      <div id="blackholeMessage" class="text-amber-300 text-xs font-bold text-center min-h-[40px] mt-1"></div>
    </div>

    <!-- ========== النجم النيوتروني ========== -->
    <div class="cosmic-card p-3 md:p-4 flex flex-col border-cyan-700/50">
      <h2 class="text-2xl md:text-3xl font-bold text-cyan-300 text-center">💫 نجم نيوتروني</h2>
      
      <div class="mt-2 px-1">
        <div class="flex justify-between text-xs text-cyan-300">
          <span>🚀 بعيد</span>
          <span class="font-mono text-yellow-300" id="nsDistanceLabel">50%</span>
          <span>⚡ قريب</span>
        </div>
        <input type="range" id="nsSlider" min="0" max="100" value="50" class="w-full accent-cyan-600 my-1" style="height: 30px;">
        
        <div class="grid grid-cols-3 gap-1 text-center text-xs mt-2">
          <div><span class="block text-cyan-400 text-base md:text-lg" id="nsRedshift">z=0.3</span> <span>انزياح</span></div>
          <div><span class="block text-amber-400 text-base md:text-lg" id="nsTime">1.0x</span> <span>تمدد</span></div>
          <div><span class="block text-purple-300 text-base md:text-lg" id="nsDistortion">معتدل</span> <span>تشوه</span></div>
        </div>
        <div class="w-full bg-gray-800 h-2 rounded-full mt-1 overflow-hidden">
          <div id="nsRedshiftBar" class="bg-gradient-to-r from-blue-500 via-cyan-300 to-indigo-400 h-full" style="width:30%"></div>
        </div>
      </div>
      
      <div class="zone-area mt-2" id="neutronZone">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-32 h-32 md:w-36 md:h-36 rounded-full neutron-star flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full border-4 border-cyan-400/40 animate-ping"></div>
            <div class="text-3xl md:text-4xl">⚡</div>
          </div>
        </div>
        <div id="neutronItems" class="relative w-full h-full pointer-events-auto"></div>
      </div>
      
      <div class="flex flex-wrap justify-center gap-1 mt-2">
        <button class="custom-btn bg-gradient-to-r from-cyan-700 to-blue-800" onclick="throwItem('neutron','astronaut')" ontouchstart="throwItem('neutron','astronaut')">👨‍🚀</button>
        <button class="custom-btn bg-gradient-to-r from-cyan-700 to-blue-800" onclick="throwItem('neutron','satellite')" ontouchstart="throwItem('neutron','satellite')">🛰️</button>
        <button class="custom-btn bg-gradient-to-r from-cyan-700 to-blue-800" onclick="throwItem('neutron','magnet')" ontouchstart="throwItem('neutron','magnet')">🧲</button>
        <button class="custom-btn bg-gradient-to-r from-cyan-700 to-blue-800" onclick="throwItem('neutron','random')" ontouchstart="throwItem('neutron','random')">🎲</button>
      </div>
      <div id="neutronMessage" class="text-cyan-300 text-xs font-bold text-center min-h-[40px] mt-1"></div>
    </div>

    <!-- ========== الثقب الأبيض ========== -->
    <div class="cosmic-card p-3 md:p-4 flex flex-col border-yellow-600/50">
      <h2 class="text-2xl md:text-3xl font-bold text-yellow-200 text-center">⬜ ثقب أبيض</h2>
      
      <div class="mt-2 px-1">
        <div class="flex justify-between text-xs text-yellow-200">
          <span>🚀 بعيد</span>
          <span class="font-mono text-lime-300" id="whDistanceLabel">50%</span>
          <span>✨ قريب</span>
        </div>
        <input type="range" id="whSlider" min="0" max="100" value="50" class="w-full accent-yellow-500 my-1" style="height: 30px;">
        
        <div class="grid grid-cols-3 gap-1 text-center text-xs mt-2">
          <div><span class="block text-blue-300 text-base md:text-lg" id="whRedshift">z=-0.2</span> <span>ازرق</span></div>
          <div><span class="block text-amber-400 text-base md:text-lg" id="whTime">1.0x</span> <span>تمدد</span></div>
          <div><span class="block text-purple-300 text-base md:text-lg" id="whDistortion">انبعاج</span> <span>تشوه</span></div>
        </div>
        <div class="w-full bg-gray-800 h-2 rounded-full mt-1 overflow-hidden">
          <div id="whRedshiftBar" class="bg-gradient-to-r from-blue-400 via-white to-yellow-300 h-full" style="width:30%"></div>
        </div>
      </div>
      
      <div class="zone-area mt-2" id="whiteholeZone">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-32 h-32 md:w-36 md:h-36 rounded-full white-hole flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full border-4 border-white/30 animate-ping"></div>
            <div class="text-3xl md:text-4xl">🌌</div>
          </div>
        </div>
        <div id="whiteholeItems" class="relative w-full h-full pointer-events-auto"></div>
      </div>
      
      <div class="flex flex-wrap justify-center gap-1 mt-2">
        <button class="custom-btn bg-gradient-to-r from-yellow-600 to-orange-600" onclick="throwItem('whitehole','photon')" ontouchstart="throwItem('whitehole','photon')">✨</button>
        <button class="custom-btn bg-gradient-to-r from-yellow-600 to-orange-600" onclick="throwItem('whitehole','antimatter')" ontouchstart="throwItem('whitehole','antimatter')">⚛️</button>
        <button class="custom-btn bg-gradient-to-r from-yellow-600 to-orange-600" onclick="throwItem('whitehole','unicorn')" ontouchstart="throwItem('whitehole','unicorn')">🦄</button>
        <button class="custom-btn bg-gradient-to-r from-yellow-600 to-orange-600" onclick="throwItem('whitehole','random')" ontouchstart="throwItem('whitehole','random')">🎲</button>
      </div>
      <div id="whiteholeMessage" class="text-yellow-300 text-xs font-bold text-center min-h-[40px] mt-1"></div>
    </div>
  </div>

  <!-- سجل الأحداث -->
  <div class="cosmic-card p-3 mt-4 max-w-3xl w-full">
    <h3 class="text-lg md:text-xl font-bold text-indigo-300 mb-1 text-center">📜 سجل الأحداث</h3>
    <div id="eventLog" class="text-gray-300 text-xs md:text-sm" style="max-height: 100px;"></div>
    <div class="flex justify-center mt-1">
      <button onclick="clearLog()" ontouchstart="clearLog()" class="text-xs bg-indigo-900/60 hover:bg-indigo-800 px-4 py-1 rounded-full text-indigo-200">مسح</button>
    </div>
  </div>
  <script src="index.js" defer></script>
</body>
</html>
